<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChordStart | Survey</title>
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Internal CSS example */
    .center-narrow { max-width: 760px; margin: 0 auto; }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="brand">
      <div class="brand-icon">♪</div>
      <span>ChordStart</span>
    </div>

    <nav class="main-nav">
      <a href="index.html">Home</a>
      <a href="chords.html">Chords</a>
      <a href="practice.html">Practice Plan</a>
      <a href="fixes.html">Fixes</a>
      <a href="survey.html">Survey</a>
    </nav>

    <a href="#" class="btn btn-primary" style="min-width:110px; text-align:center;">Start Practice</a>
  </header>

  <main class="container center-narrow">
    <section class="page-head">
      <h1>Quick Survey</h1>
      <p>Help improve the beginner guide.</p>
    </section>

    <form class="form-card">
      <label>
        Experience Level
        <input type="text" placeholder="0–1 month, 1–3 months, etc." />
      </label>

      <label>
        Hardest Chord
        <input type="text" placeholder="G, C, D, Em, Am..." />
      </label>

      <fieldset class="check-fieldset">
        <legend>Biggest issues (select all that apply)</legend>

        <label class="check-row"><input type="checkbox" /> Buzzing strings</label>
        <label class="check-row"><input type="checkbox" /> Finger pain</label>
        <label class="check-row"><input type="checkbox" /> Slow chord switching</label>
        <label class="check-row"><input type="checkbox" /> Finger placement</label>
        <label class="check-row"><input type="checkbox" /> Strumming rhythm</label>
      </fieldset>

      <label>
        Additional Comments
        <textarea placeholder="Share your thoughts, suggestions, or challenges..."></textarea>
      </label>

      <button class="btn btn-primary btn-wide" type="submit">Submit Survey</button>
    </form>
  </main>

  <footer class="site-footer">
    <p>© 2026 ChordStart. All rights reserved.</p>
    <div class="footer-links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Contact</a>
    </div>
  </footer>
</body>
</html>
